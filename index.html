<!DOCTYPE html>
<html>
<head>
    <title>My GPS Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; }
        #dash {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(0,0,0,0.9); color: white;
            padding: 15px; border-radius: 15px; width: 80%; display: grid;
            grid-template-columns: 1fr 1fr; gap: 10px; border: 1px solid #444;
        }
        .box { text-align: center; }
        .lab { font-size: 0.7rem; color: #888; display: block; text-transform: uppercase; }
        .val { font-size: 1.2rem; font-weight: bold; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="dash">
        <div class="box"><span class="lab">Speed</span><span id="spd" class="val">0</span> km/h</div>
        <div class="box"><span class="lab">Elevation</span><span id="alt" class="val">--</span> m</div>
        <div class="box"><span class="lab">Compass</span><span id="hdg" class="val">0</span>°</div>
        <div class="box"><span class="lab">Status</span><span id="st" class="val" style="font-size:0.7rem">Waiting...</span></div>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([0,0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        var marker = L.marker([0,0]).addTo(map);

        navigator.geolocation.watchPosition(function(p) {
            var c = p.coords;
            marker.setLatLng([c.latitude, c.longitude]);
            map.setView([c.latitude, c.longitude], 16);
            document.getElementById('spd').innerText = c.speed ? (c.speed * 3.6).toFixed(1) : "0";
            document.getElementById('alt').innerText = c.altitude ? c.altitude.toFixed(0) : "--";
            document.getElementById('hdg').innerText = c.heading ? c.heading.toFixed(0) : "0";
            document.getElementById('st').innerText = "LIVE GPS";
        }, function(e) { document.getElementById('st').innerText = "Err: " + e.message; }, 
        { enableHighAccuracy: true });
    </script>
</body>
</html>
